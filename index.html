<!--
Flexygal by Damir Sijakovic (c) 2019
Tiny, one file gallery.
Fixed: smooth zoom animation from clicked thumbnail to fullscreen modal.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Flexygal</title>
<style type="text/css">

body {
    margin: 0;
    padding: 24px;
    background: DimGray;
}

.flexygal {
    display: flex;
    justify-content: center;
    flex-flow: row wrap;
    gap: 8px;
}

.box {
    position: relative;
    width: 100px;
    height: 100px;
    overflow: hidden;
    box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19);
    background: repeating-linear-gradient(to bottom left, #333 0, #333 20px, #383838 21px, #383838 40px);
}

/* Under 500px: one tile per row, sized to the viewport (minus body padding). */
@media (max-width: 499px) {
    .box {
        width: calc(100vw - 48px);
        height: calc(100vw - 48px);
    }
}

@media (min-width: 600px) {
    .box { width: 200px; height: 200px; }
}

@media (min-width: 1000px) {
    .box { width: 300px; height: 300px; }
}

.image {
    height: 100%;
    width: 100%;
    background: lightgray;
    position: absolute;
    top: 0;
    left: 0;
    cursor: pointer;
    transition: transform .25s ease-out;
}

.box:hover {
    z-index: 10;
    box-shadow: 0 24px 24px 0 rgba(0,0,0,0.2), 0 40px 77px 0 rgba(0,0,0,0.22);
}

.box:hover .image {
    transform: scale(1.15);
}

/*
 * Modal: starts as a clone positioned exactly over the clicked thumbnail,
 * then transitions into a centered fullscreen view. The backdrop fades in
 * underneath separately so the image itself appears to grow out of the tile.
 */
.modal-backdrop {
    position: fixed;
    inset: 0;
    background-color: rgba(0, 0, 19, 0);
    z-index: 2999;
    pointer-events: none;
    transition: background-color .35s ease;
}

.modal-backdrop.active {
    background-color: rgba(0, 0, 19, 0.85);
    pointer-events: auto;
    cursor: zoom-out;
}

.modal-image {
    position: fixed;
    z-index: 3000;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    box-shadow: 0 24px 60px 0 rgba(0,0,0,0.5);
    transition: top .4s cubic-bezier(.2,.7,.2,1),
                left .4s cubic-bezier(.2,.7,.2,1),
                width .4s cubic-bezier(.2,.7,.2,1),
                height .4s cubic-bezier(.2,.7,.2,1),
                background-size .4s ease;
    cursor: zoom-out;
}

.modal-image.expanded {
    background-size: contain;
    background-color: #000;
}

/* Hide the original tile while its clone is on screen so there is no doubled image */
.box.is-source .image {
    visibility: hidden;
}

</style>
</head>
<body>

<div class="flexygal" id="gallery">
    <div class="box"><div class="image" style="background-image: url(img/1.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/2.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/3.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/4.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/5.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/6.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/7.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/8.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/9.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/10.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/11.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/12.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(img/13.jpg)"></div></div>
    <div class="box"><div class="image" style="background-image: url(wrong.url)"></div></div>
</div>

<div class="modal-backdrop" id="backdrop"></div>

<script>
(function () {
    var gallery = document.getElementById('gallery');
    var backdrop = document.getElementById('backdrop');
    var activeClone = null;
    var sourceBox = null;
    var isAnimating = false;

    // Target size of the expanded image: fits viewport with a margin, keeps aspect ratio sane.
    function getTargetRect() {
        var margin = 40;
        var w = window.innerWidth - margin * 2;
        var h = window.innerHeight - margin * 2;
        return {
            left: margin,
            top: margin,
            width: w,
            height: h
        };
    }

    function openImage(imageEl) {
        if (isAnimating || activeClone) return;
        isAnimating = true;

        var box = imageEl.parentElement;
        sourceBox = box;
        var rect = imageEl.getBoundingClientRect();
        var bg = imageEl.style.backgroundImage;

        // Build the clone at the exact position/size of the clicked thumbnail.
        var clone = document.createElement('div');
        clone.className = 'modal-image';
        clone.style.backgroundImage = bg;
        clone.style.top = rect.top + 'px';
        clone.style.left = rect.left + 'px';
        clone.style.width = rect.width + 'px';
        clone.style.height = rect.height + 'px';
        document.body.appendChild(clone);

        // Hide the original so the clone takes its place visually.
        box.classList.add('is-source');

        // Force a reflow so the browser registers the starting state before transitioning.
        // Without this, setting the target values immediately after appending would skip the animation.
        void clone.offsetWidth;

        var target = getTargetRect();
        clone.classList.add('expanded');
        clone.style.top = target.top + 'px';
        clone.style.left = target.left + 'px';
        clone.style.width = target.width + 'px';
        clone.style.height = target.height + 'px';

        backdrop.classList.add('active');

        activeClone = clone;

        // Unlock interaction once the transition finishes.
        clone.addEventListener('transitionend', function onEnd(e) {
            if (e.propertyName === 'width') {
                isAnimating = false;
                clone.removeEventListener('transitionend', onEnd);
            }
        });
    }

    function closeImage() {
        if (isAnimating || !activeClone || !sourceBox) return;
        isAnimating = true;

        var clone = activeClone;
        var image = sourceBox.querySelector('.image');
        var rect = image.getBoundingClientRect();

        clone.classList.remove('expanded');
        clone.style.top = rect.top + 'px';
        clone.style.left = rect.left + 'px';
        clone.style.width = rect.width + 'px';
        clone.style.height = rect.height + 'px';

        backdrop.classList.remove('active');

        clone.addEventListener('transitionend', function onEnd(e) {
            if (e.propertyName !== 'width') return;
            clone.removeEventListener('transitionend', onEnd);
            sourceBox.classList.remove('is-source');
            clone.parentNode.removeChild(clone);
            activeClone = null;
            sourceBox = null;
            isAnimating = false;
        });
    }

    // Event delegation — one listener for the whole gallery instead of per-tile inline onclick.
    gallery.addEventListener('click', function (e) {
        var img = e.target.closest('.image');
        if (img) openImage(img);
    });

    backdrop.addEventListener('click', closeImage);
    document.addEventListener('click', function (e) {
        // Clicking the expanded image itself also closes it.
        if (activeClone && e.target === activeClone) closeImage();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeImage();
    });

    // If the viewport resizes while a modal is open, keep the image fitted.
    window.addEventListener('resize', function () {
        if (!activeClone || isAnimating) return;
        var target = getTargetRect();
        activeClone.style.top = target.top + 'px';
        activeClone.style.left = target.left + 'px';
        activeClone.style.width = target.width + 'px';
        activeClone.style.height = target.height + 'px';
    });
})();
</script>

</body>
</html>
